 <h1 style="color:blue;">Simple form</h1>  
 <form>
    <label for="FN">Full name:</label>
    <input type="text" id="FN" required placeholder="Please enter your name"><br><br>
    <label for="email">Email address</label>
    <input type="email" id="email" required placeholder="Enter your email"><br><br>
    <label for="age">Age</label>
    <input type="number" id="age"><br><br>
    <label>Gender:</label><br>
    <label for="Male">Male</label>
    <input type="radio" id="Male" name="Gender"><br>
    <label for="female">Female</label>
    <input type="radio" id="female" name="Gender"><br><br>
    <label for="">Course:</label>
    <select name="" id="course">
        <option value="MIT">Full stack software development</option>
        <option value="CYBER">Cybersecurity</option>
        <option value="DS">Datascience</option>
        <option value="AI">Artificial intelligence</option>
    </select> <br><br>
    <label for="Terms" required>Agree terms and conditions</label> 
    <input type="checkbox" id="Terms">
    <label for="message">Tell us about yourself</label> <br>
    <textarea name="" id="message" cols="30" rows="5"></textarea> <br>









<button type="submit">SUBMIT DATA</button>
</form>
</body>
